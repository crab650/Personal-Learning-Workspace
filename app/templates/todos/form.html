{% extends "base.html" %}

{% block title %}{{ title }} - Personal Learning & Workspace{% endblock %}

{% block content %}
<div class="page-heading">
  <div>
    <h1>{{ title }}</h1>
    <p>設定任務狀態、優先順序、截止日期與提醒時間。</p>
  </div>
  <a class="btn btn-outline-secondary" href="{{ return_to or url_for('pages.todos') }}">返回列表</a>
</div>

<form method="post">
  {% if return_to %}
    <input type="hidden" name="next" value="{{ return_to }}">
  {% endif %}
  <section class="panel todo-form-panel">
    <div class="row g-3">
      <div class="col-lg-8">
        <label class="form-label">標題</label>
        <textarea id="todo-title-input" class="form-control todo-title-input" name="title" maxlength="500" rows="2" required>{{ todo.title if todo else '' }}</textarea>
        <small class="text-secondary">Enter 儲存，Shift + Enter 換行</small>
      </div>
      <div class="col-lg-4">
        <label class="form-label">分類</label>
        <select class="form-select" name="category_id">
          <option value="">未分類</option>
          {% for category in categories %}
            <option value="{{ category.id }}" {% if todo and todo.category_id == category.id %}selected{% endif %}>
              {{ category.name }}
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="col-lg-4">
        <label class="form-label">專案</label>
        <select class="form-select" name="project_id">
          <option value="">未指定專案</option>
          {% for project in projects %}
            <option value="{{ project.id }}" {% if (todo and todo.project_id == project.id) or (not todo and selected_project_id == project.id) %}selected{% endif %}>
              {{ project.name }}
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="col-lg-4">
        <label class="form-label">新增專案名稱</label>
        <input class="form-control" name="new_project_name" placeholder="輸入後會自動建立">
      </div>
      <div class="col-lg-4">
        <label class="form-label">狀態</label>
        <select class="form-select" name="status">
          {% for status in statuses %}
            <option value="{{ status }}" {% if (todo and todo.status == status) or (not todo and status == 'Todo') %}selected{% endif %}>{{ status }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-lg-4">
        <label class="form-label">優先順序</label>
        <select class="form-select" name="priority">
          {% for priority in priorities %}
            <option value="{{ priority }}" {% if (todo and todo.priority == priority) or (not todo and priority == 'Medium') %}selected{% endif %}>{{ priority }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-lg-4">
        <label class="form-label">截止日期</label>
        <input class="form-control" type="date" name="due_date" value="{{ todo.due_date.isoformat() if todo and todo.due_date else '' }}">
      </div>
      <div class="col-lg-4">
        <label class="form-label">提醒時間</label>
        <input class="form-control" type="datetime-local" name="reminder_at" value="{{ todo.reminder_at.strftime('%Y-%m-%dT%H:%M') if todo and todo.reminder_at else '' }}">
      </div>
      <div class="col-12">
        <label class="form-label">說明（Markdown）</label>
        <div class="todo-description-grid">
          <textarea id="todo-description-input" class="form-control todo-description" name="description" spellcheck="false">{{ todo.description if todo else '' }}</textarea>
          <article id="todo-description-preview" class="markdown-body todo-markdown-preview"></article>
        </div>
      </div>
    </div>
  </section>

  <div class="form-actions">
    <button class="btn btn-primary">儲存</button>
    <a class="btn btn-outline-secondary" href="{{ return_to or url_for('pages.todos') }}">取消</a>
  </div>
</form>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const todoDescriptionInput = document.getElementById("todo-description-input");
  const todoDescriptionPreview = document.getElementById("todo-description-preview");

  function renderTodoDescription() {
    todoDescriptionPreview.innerHTML = marked.parse(todoDescriptionInput.value || "");
    window.highlightMarkdown(todoDescriptionPreview);
  }

  if (todoDescriptionInput && todoDescriptionPreview) {
    todoDescriptionInput.addEventListener("input", renderTodoDescription);
    renderTodoDescription();
  }

  const todoTitleInput = document.getElementById("todo-title-input");
  if (todoTitleInput) {
    const resizeTitle = () => {
      todoTitleInput.style.height = "auto";
      todoTitleInput.style.height = `${todoTitleInput.scrollHeight}px`;
    };
    todoTitleInput.addEventListener("input", resizeTitle);
    todoTitleInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        todoTitleInput.form.requestSubmit();
      }
    });
    resizeTitle();
  }
</script>
{% endblock %}
